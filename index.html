<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专属运势</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 用于生成海报 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入高质感细字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- 核心梦幻配色 --- */
        :root { 
            --horse-blue: #A2E0F5;    
            --coral-pink: #FF9A94;    
            --text-main: #756C69;     
            --bg-pearl: #FDFCFB;      
        }
        
        body { 
            font-family: 'Inter', -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; 
            background-color: var(--bg-pearl); 
            color: var(--text-main); 
            overscroll-behavior: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .serif { font-family: 'Noto Serif SC', serif; }
        
        /* --- 柔和毛玻璃卡片 --- */
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 36px; 
            box-shadow: 0 20px 50px -10px rgba(162, 224, 245, 0.35); 
        }
        
        /* --- 背景极慢呼吸光晕 --- */
        .bg-glow { 
            position: fixed; 
            width: 150vw; 
            height: 150vw; 
            top: -25%; 
            left: -25%; 
            background: radial-gradient(circle at 30% 30%, rgba(162, 224, 245, 0.15) 0%, rgba(255, 255, 255, 0) 45%),
                        radial-gradient(circle at 70% 70%, rgba(255, 154, 148, 0.12) 0%, rgba(255, 255, 255, 0) 45%);
            z-index: -1; 
            animation: drift 40s infinite alternate ease-in-out; 
        }
        @keyframes drift { from { transform: rotate(0deg) scale(1); } to { transform: rotate(5deg) scale(1.05); } }

        .hidden-view { display: none !important; }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 交互组件 --- */
        .gender-btn { transition: all 0.3s ease; color: #9B928F; }
        .gender-btn.active { 
            background: var(--coral-pink); 
            color: white; 
            border-color: var(--coral-pink); 
            box-shadow: 0 6px 16px rgba(255, 154, 148, 0.3);
        }
        
        .star-icon { width: 18px; height: 18px; display: inline-block; transition: all 0.4s; }
        .star-full { fill: var(--coral-pink); }
        .star-empty { fill: #F0EBE9; }
        
        input[type="text"], input[type="date"] {
            -webkit-appearance: none;
            border-radius: 16px;
            font-size: 15px; 
            color: var(--text-main);
        }
        input:focus { outline: none; border-color: var(--horse-blue); background: white; box-shadow: 0 0 0 3px rgba(162, 224, 245, 0.2); }
        input::placeholder { color: #CDC7C5; font-weight: 300; }
        
        .breathing { animation: breath 2.5s infinite ease-in-out; }
        @keyframes breath { 0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px rgba(162,224,245,0.4)); } 50% { opacity: 0.8; transform: scale(0.96); filter: drop-shadow(0 0 2px rgba(162,224,245,0.1)); } }

        /* 海报模式强制样式 */
        .poster-mode { border-radius: 0 !important; box-shadow: none !important; background: #FDFCFB !important; padding-bottom: 30px; border: none !important; }
        #poster-modal { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen w-full px-5 safe-area-padding">

    <div class="bg-glow"></div>

    <!-- ================= 视图 1：注册页 ================= -->

    <script>
        /* =========================================
           核心算法区
           ========================================= */
        function mulberry32(a) {
            return function() {
              var t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

            ],

                "合作关系可能面临隐性考验，沟通时请尽量柔软。切忌在下午时段做冲动的决定。今日适合独自处理文书工作，屏蔽外界干扰。",

            dos:["喝杯温水","整理桌面","早睡一小时","给家人电话","深度阅读","修剪指甲","晒晒太阳","冥想五分钟","记录灵感","吃顿好的","复盘计划","听首老歌","更换壁纸","清理相册","大口呼吸","赞美他人","写下目标","伸个懒腰","保持微笑","拒绝内耗","立刻行动","买束鲜花","看场电影","泡个热水澡"],
            donts:["急于反驳","深夜emo","暴饮暴食","久坐不动","盲目跟风","过度承诺","在此刻放弃","翻旧账","预支焦虑","情绪消费","轻信流言","自我怀疑","犹豫不决","沉迷短视频","空腹喝咖","硬碰硬","比较他人","抱怨生活","熬夜追剧","忽视早餐","乱发脾气","透支信用卡"],

                {hex:"#A2E0F5", name:"梦幻粉蓝"}, {hex:"#FF9A94", name:"珊瑚柔粉"}, {hex:"#FFF59D", name:"星光淡黄"}, {hex:"#C5E1A5", name:"薄荷浅绿"}, 
                {hex:"#B39DDB", name:"薰衣草紫"}, {hex:"#FFCC80", name:"蜜桃暖橘"}, {hex:"#80CBC4", name:"海浪青蓝"}, {hex:"#F48FB1", name:"樱花淡粉"},
                {hex:"#E6EE9C", name:"青柠果绿"}, {hex:"#9FA8DA", name:"暮光灰蓝"}, {hex:"#FFAB91", name:"晚霞暖橘"}, {hex:"#CE93D8", name:"紫丁香色"}

            dirs:["正东","正西","正南","正北","东南","东北","西南","西北"]

        /* =========================================
           逻辑交互区
           ========================================= */
        let selectedGender = '';

        function selectGender(g) {
            selectedGender = g;
            document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function generateFortune(user) {
            const today = new Date();
            const nameCode = user.name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const bdayCode = new Date(user.bday).getDate(); 
            const userHash = nameCode + bdayCode + (user.gender === 'male' ? 1 : 2);

            const dayOfYear = getDayOfYear();
            const mainIdx = (userHash + dayOfYear) % DB.main.length;
            const main = DB.main[mainIdx];

            const dateStr = `${today.getFullYear()}${today.getMonth()}${today.getDate()}`;
            const seedVal = parseInt(dateStr) + userHash; 
            const rng = mulberry32(seedVal); 

            const warningIdx = Math.floor(rng() * DB.warnings.length);
            const doIdx = Math.floor(rng() * DB.dos.length);
            let dontIdx = Math.floor(rng() * DB.donts.length);
            if(DB.dos[doIdx] === DB.donts[dontIdx]) dontIdx = (dontIdx + 1) % DB.donts.length;

            const foodIdx = Math.floor(rng() * DB.foods.length);
            const colorIdx = Math.floor(rng() * DB.colors.length);
            const dirIdx = Math.floor(rng() * DB.dirs.length);
            const luckyNum = Math.floor(rng() * 10);

            return {
                main: main, 
                warning: DB.warnings[warningIdx],
                do: DB.dos[doIdx], dont: DB.donts[dontIdx],
                food: DB.foods[foodIdx], color: DB.colors[colorIdx], dir: DB.dirs[dirIdx], num: luckyNum
            };
        }

        function saveProfile() {
            const name = document.getElementById('input-name').value.trim();
            const bday = document.getElementById('input-date').value;
            if (!name || !bday || !selectedGender) return alert("请完整填写信息，以校准磁场");
            
            localStorage.setItem('lucky_user', JSON.stringify({ name, bday, gender: selectedGender }));
            startBuffering();
        }

        function startBuffering() {
            document.getElementById('register-view').classList.add('hidden-view');
            document.getElementById('result-view').classList.add('hidden-view');
            document.getElementById('buffer-view').classList.remove('hidden-view');
            
            const user = JSON.parse(localStorage.getItem('lucky_user'));
            
            document.getElementById('buffer-text').innerHTML = 
                `正在确认<br><span class="font-normal text-[#FF9A94] text-lg mx-1">${user.name}</span>的运势`;
            
            setTimeout(showResult, 1800); 
        }

        function showResult() {
            document.getElementById('buffer-view').classList.add('hidden-view');
            document.getElementById('result-view').classList.remove('hidden-view');
            
            const user = JSON.parse(localStorage.getItem('lucky_user'));
            
            const today = new Date();
            const dateString = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
            document.getElementById('display-date').innerText = dateString;
            
            document.getElementById('display-name-fortune').innerText = `${user.name} 的今日运势`;

            const res = generateFortune(user);
            
            document.getElementById('lucky-keyword').innerText = res.main.kw;
            document.getElementById('lucky-message').innerText = res.main.msg;
            document.getElementById('lucky-warning').innerText = res.warning; 
            
            document.getElementById('advice-do').innerText = res.do;
            document.getElementById('advice-dont').innerText = res.dont;
            
            document.getElementById('meta-num').innerText = res.num;
            document.getElementById('meta-food').innerText = res.food;
            document.getElementById('meta-dir').innerText = res.dir;
            document.getElementById('meta-color-block').style.backgroundColor = res.color.hex;
            
            const container = document.getElementById('star-container');
            container.innerHTML = '';
            for(let i=1; i<=5; i++) {
                const isFull = i <= res.main.score;
                container.innerHTML += `
                    <svg class="star-icon ${isFull ? 'star-full' : 'star-empty'}" viewBox="0 0 100 100">
                        <path d="M50 10 C50 40 40 50 10 50 C40 50 50 60 50 90 C50 60 60 50 90 50 C60 50 50 40 50 10 Z" />
                    </svg>`;
            }
        }

        window.onload = () => {
            if (localStorage.getItem('lucky_user')) {
                startBuffering(); 
            } else {
                document.getElementById('register-view').classList.remove('hidden-view'); 
            }
        };

        function generatePoster() {
            const element = document.getElementById('capture-area');
            element.classList.add('poster-mode');

            html2canvas(element, { 
                backgroundColor: "#FDFCFB", 
                scale: 2.5, 
                useCORS: true
            }).then(canvas => {
                element.classList.remove('poster-mode');
                document.getElementById('generated-image').src = canvas.toDataURL("image/png");
                document.getElementById('poster-modal').classList.remove('hidden');
            });
        }

        function closePoster() {
            document.getElementById('poster-modal').classList.add('hidden');
        }
    </script>
